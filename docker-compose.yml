services:
  patient-service:
    build:
      context: .
      dockerfile: patient-service/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - patient-data:/app/patient-service

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PATIENT_SERVICE_URL: http://patient-service:8001
    depends_on:
      - patient-service
    volumes:
      - booking-data:/app/booking-service

volumes:
  patient-data:
  booking-data:
